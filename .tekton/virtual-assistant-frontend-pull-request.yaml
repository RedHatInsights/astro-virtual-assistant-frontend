apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/astro-virtual-assistant-frontend?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch == "main"
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: virtual-assistant
    appstudio.openshift.io/component: virtual-assistant-frontend
    pipelines.appstudio.openshift.io/type: build
  name: virtual-assistant-frontend-on-pull-request
  namespace: hcc-platex-services-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/hcc-platex-services-tenant/virtual-assistant/virtual-assistant-frontend:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile

  # Workspace setup - install dependencies BEFORE tests run
  - name: workspace-setup-script
    value: |
      #!/bin/bash
      set -ex
      # Install npm dependencies (including Playwright)
      npm ci
      # Note: Playwright browsers are pre-installed in the playwright image
      # when image version matches package.json (both 1.40.0)

  # Unit tests script
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex
      npm run test

  # E2E tests script - ONLY run tests, dependencies installed in workspace-setup-script
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex
      npx playwright test

  # Run app script - start Caddy to serve app assets
  - name: run-app-script
    value: |
      #!/bin/bash
      set -ex
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  # E2E configuration
  - name: e2e-playwright-image
    value: "mcr.microsoft.com/playwright:v1.60.0-jammy"

  # ConfigMap and Secret names (will be created in next step)
  - name: frontend-proxy-routes-configmap
    value: "virtual-assistant-dev-proxy-caddyfile"

  - name: e2e-credentials-secret
    value: "virtual-assistant-credentials-secret"

  pipelineRef:
    params:
    - name: url
      value: https://github.com/RedHatInsights/konflux-pipelines
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
    resolver: git
  taskRunTemplate:
    serviceAccountName: build-pipeline-virtual-assistant-frontend
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
